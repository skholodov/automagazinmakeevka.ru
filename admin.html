<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#1a1a2e">
    <meta http-equiv="Content-Style-Type" content="text/css">
    <title>Admin Panel | Мороз Денис</title>
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="admin-body">
    <!-- Login Screen -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="login-logo">
                <i class="fas fa-cogs"></i>
                <h2>Мороз Денис</h2>
                <p>Панель управления</p>
            </div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Логин</label>
                    <input type="text" id="username" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
                <div class="login-error" id="loginError">
                    <i class="fas fa-exclamation-circle"></i> Неверный логин или пароль
                </div>
            </form>
            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Вернуться на сайт</a>
            </div>
        </div>
    </div>

    <!-- Admin Sidebar -->
    <aside class="admin-sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-cogs"></i>
                <span>Мороз Денис</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li data-page="products">
                    <a href="#products">
                        <i class="fas fa-boxes"></i>
                        <span>Товары</span>
                    </a>
                </li>
                <li data-page="categories">
                    <a href="#categories">
                        <i class="fas fa-tags"></i>
                        <span>Категории</span>
                    </a>
                </li>
                <li data-page="brands">
                    <a href="#brands">
                        <i class="fas fa-star"></i>
                        <span>Бренды</span>
                    </a>
                </li>
                <li data-page="settings">
                    <a href="#settings">
                        <i class="fas fa-cog"></i>
                        <span>Настройки</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="index.html" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-external-link-alt"></i>
                <span>Перейти на сайт</span>
            </a>
            <button id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Выйти</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <!-- Top Header -->
        <header class="admin-header">
            <div class="header-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title" id="pageTitle">Товары</h1>
            </div>
            <div class="header-right">
                <div class="header-time">
                    <i class="fas fa-clock"></i>
                    <span id="currentTime"></span>
                </div>
                <div class="header-user">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">Администратор</span>
                        <span class="user-role">admin</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Pages -->
        <div class="admin-content">

            <!-- Products Page -->
            <div class="page active" id="page-products">
                <div class="page-header">
                    <div class="page-actions">
                        <button class="btn btn-primary" id="addProductBtn">
                            <i class="fas fa-plus"></i> Добавить товар
                        </button>
                    </div>
                    <div class="page-filters">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="productSearch" placeholder="Поиск товаров...">
                        </div>
                        <select id="categoryFilter" class="filter-select">
                            <option value="">Все категории</option>
                            <option value="filters">Фильтры</option>
                            <option value="brakes">Тормоза</option>
                            <option value="oils">Масла</option>
                            <option value="batteries">Аккумуляторы</option>
                        </select>
                        <select id="brandFilter" class="filter-select">
                            <option value="">Все бренды</option>
                            <option value="bosch">Bosch</option>
                            <option value="brembo">Brembo</option>
                            <option value="castrol">Castrol</option>
                        </select>
                    </div>
                </div>

                <div class="products-table-wrapper">
                    <table class="data-table" id="productsTable">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="selectAllProducts"></th>
                                <th>Артикул</th>
                                <th>Изображение</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Бренд</th>
                                <th>Цена</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <!-- Products will be loaded here -->
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="productsPagination">
                    <!-- Pagination will be loaded here -->
                </div>
            </div>

            <!-- Categories Page -->
            <div class="page" id="page-categories">
                <div class="page-header">
                    <div class="page-actions">
                        <button class="btn btn-primary" id="addCategoryBtn">
                            <i class="fas fa-plus"></i> Добавить категорию
                        </button>
                    </div>
                </div>

                <div class="categories-grid" id="categoriesGrid">
                    <!-- Categories will be loaded here -->
                </div>
            </div>

            <!-- Brands Page -->
            <div class="page" id="page-brands">
                <div class="page-header">
                    <div class="page-actions">
                        <button class="btn btn-primary" id="addBrandBtn">
                            <i class="fas fa-plus"></i> Добавить бренд
                        </button>
                    </div>
                </div>

                <div class="brands-grid" id="brandsGrid">
                    <!-- Brands will be loaded here -->
                </div>
            </div>

            <!-- Settings Page -->
            <div class="page" id="page-settings">
                <div class="settings-grid">
                    <div class="settings-section">
                        <h3><i class="fas fa-store"></i> Основные настройки</h3>
                        <div class="settings-form">
                            <div class="form-group">
                                <label>Название магазина</label>
                                <input type="text" id="shopName" value="Мороз Денис">
                            </div>
                            <div class="form-group">
                                <label>Телефон</label>
                                <input type="tel" id="shopPhone" value="+7 (949) 384-85-91">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="shopEmail" value="info@morozdenis.ru">
                            </div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3><i class="fas fa-shipping-fast"></i> Настройки доставки</h3>
                        <div class="settings-form">
                            <div class="form-group">
                                <label>Бесплатная доставка от (₽)</label>
                                <input type="number" id="freeShipping" value="5000">
                            </div>
                            <div class="form-group">
                                <label>Стоимость доставки (₽)</label>
                                <input type="number" id="shippingCost" value="500">
                            </div>
                        </div>
                    </div>

                    <div class="settings-section full-width">
                        <button class="btn btn-primary" id="saveSettingsBtn">
                            <i class="fas fa-save"></i> Сохранить настройки
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Заголовок</h3>
                <button class="modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Modal content -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-secondary" id="modalCancel">Отмена</button>
                <button class="btn btn-primary" id="modalSave">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="assets/js/admin.js"></script>
</body>

</html>
